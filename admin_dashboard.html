<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background-image: url("https://i.pinimg.com/originals/12/e8/a6/12e8a6a547e317524121f7a5d6084036.gif");
            background-size: cover;
            background-position: center;
            color: white;
        }

        .container {
            width: 90%;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px black;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #000;
        }

        th {
            background-color: #1e90ff;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #d1e7ff;
        }

        .logout-btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: red;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Admin Dashboard - Votes</h1>

    <a href="/admin/logout" class="logout-btn">Logout</a>

    <table>
        <tr>
            <th>Candidate ID</th>
            <th>Candidate Name</th>
            <th>Party</th>
            <th>Total Votes</th>
        </tr>
        {% for c in candidates %}
            {% if candidate_votes[c.id] > 0 %}
            <tr>
                <td>{{ c.id }}</td>
                <td>{{ c.name }}</td>
                <td>{{ c.party }}</td>
                <td>{{ candidate_votes[c.id] }}</td>
            </tr>
            {% endif %}
        {% endfor %}
    </table>
</div>

</body>
</html>
