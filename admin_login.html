<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: 'Arial', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            /* Background image with dark overlay for readability */
            background: 
                linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                url('https://e1.pxfuel.com/desktop-wallpaper/721/613/desktop-wallpaper-abstract-login-page.jpg') no-repeat center center;
            background-size: cover;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1); /* transparent glass effect */
            backdrop-filter: blur(10px); /* glass blur */
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            text-align: center;
            color: white;
            width: 350px;
        }

        .login-box h2 {
            font-size: 32px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border: none;
            border-radius: 8px;
            outline: none;
            font-size: 16px;
        }

        input::placeholder {
            color: #ddd;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 8px;
            background: #00c853; /* green button */
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: #009624;
        }

        p {
            margin-top: 15px;
            color: #ff5252;
            font-weight: bold;
        }
    </style>
</head>

<body>
<div class="login-box">
    <h2>Admin Login</h2>

    <form method="post">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    {% if error %}
    <p>{{ error }}</p>
    {% endif %}
</div>
</body>
</html>
