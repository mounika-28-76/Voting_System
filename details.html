<!DOCTYPE html>
<html>
<head>
    <title>Voter Eligible</title>
    <style>
        /* Full-page background */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center; /* center horizontally */
            align-items: center;     /* center vertically */
            background-image: url('https://offload.media.kychub.com/wp-content/uploads/2024/08/11152142/Voter-ID-Verification.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: Arial, sans-serif;
            text-align: center;
            color: black;
        }

        /* Transparent card */
        .card {
            padding: 0; /* no white background */
        }

        .card h2 {
            margin: 0 0 25px 0;
            font-size: 36px; /* bigger text */
            text-shadow: 2px 2px 4px white; /* readable on image */
        }

        .card p {
            margin: 12px 0;
            font-size: 22px; /* bigger text */
            text-shadow: 1px 1px 3px white;
        }

        /* Green button for Proceed */
        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 14px 30px;
            border-radius: 5px;
            background-color: green; /* green button */
            border: none;
            color: white;
            font-weight: bold;
            text-decoration: none;
            font-size: 18px; /* bigger button text */
            transition: 0.3s;
        }

        .btn:hover {
            background-color: darkgreen;
        }
    </style>
</head>
<body>

<div class="card">
  <h2>Voter Eligible ✅</h2>
  <p>Name: Suresh Kumar</p>
  <p>Age: 25</p>
  <p>Constituency: Hyderabad</p>

  <a href="/face" class="btn">Proceed</a>
</div>

</body>
</html>
