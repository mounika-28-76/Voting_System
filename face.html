<!DOCTYPE html>
<html>
<head>
    <title>Face Recognition</title>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('https://i.pinimg.com/originals/12/e8/a6/12e8a6a547e317524121f7a5d6084036.gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
        }

        .card {
            text-align: center;
            position: relative;
        }

        h2 {
            font-size: 36px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px black;
        }

        p {
            font-size: 22px;
            margin-bottom: 20px;
            text-shadow: 1px 1px 3px black;
        }

        video {
            width: 380px;
            height: 285px;
            border: 3px solid #00ff00;
            border-radius: 12px;
            margin-bottom: 20px;
            position: relative;
        }

        /* Scanner line animation */
        .scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 380px;
            height: 4px;
            background: limegreen;
            box-shadow: 0 0 10px limegreen, 0 0 20px limegreen;
            animation: scan 2s linear infinite;
            border-radius: 2px;
        }

        @keyframes scan {
            0% { top: 0; }
            50% { top: 281px; }
            100% { top: 0; }
        }

        .btn {
            display: inline-block;
            padding: 14px 30px;
            border-radius: 5px;
            background-color: green;
            border: none;
            color: white;
            font-weight: bold;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: darkgreen;
        }

        /* Eligibility message */
        .eligibility {
            font-size: 22px;
            color: #00ff00;
            margin-top: 15px;
            display: none; /* hidden initially */
        }

        .eligibility.show {
            display: block;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Face Recognition</h2>
    <p>Please look into the camera</p>

    <div style="position: relative; display: inline-block;">
        <video id="video" autoplay></video>
        <div class="scanner-line"></div>
    </div>

    <p class="eligibility" id="eligibility-msg">✅ You are eligible to vote!</p>

    <br>
    <a href="/fingerprint" class="btn" id="next-btn" style="display:none;">Next</a>
</div>

<script>
    // Open camera automatically
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            document.getElementById("video").srcObject = stream;
        })
        .catch(error => {
            alert("Camera access denied or not available");
        });

    // Simulate scanning and eligibility detection
    setTimeout(() => {
        // Show eligibility message
        document.getElementById('eligibility-msg').classList.add('show');
        // Show Next button
        document.getElementById('next-btn').style.display = 'inline-block';
    }, 4000); // 4 seconds scan time
</script>

</body>
</html>
