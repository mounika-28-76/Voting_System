<!DOCTYPE html>
<html>
<head>
    <title>Voting Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: url('https://wise.com/imaginary-v2/1e532c6a4fd9ca2c03ff1b267c282ef2.jpg?width=1200');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
            text-shadow: 1px 1px 2px black;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 32px;
        }

        h3 {
            margin-bottom: 15px;
            font-size: 24px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0 0 30px 0;
        }

        ul li {
            margin-bottom: 25px;
            font-size: 18px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            font-size: 16px;
        }

        .start-btn {
            background-color: green;
            color: white;
        }

        .admin-btn {
            background-color: #1e90ff;
            color: white;
        }

        .logout-btn {
            background-color: red;
            color: white;
        }

        .github-btn {
            background-color: black;
            color: white;
            padding: 12px 25px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
        }

        .github-btn:hover {
            background-color: #333;
        }

    </style>
</head>

<body>

    <h1>Welcome to Online Voting System</h1>

    <h2>ONLINE VOTING SYSTEM</h2>

    <h3>Voting Steps:</h3>

    <ul>
        <li>👉 Aadhaar Verification</li>
        <li>👉 Voter Details Verified</li>
        <li>👉 Face Recognition</li>
        <li>👉 Fingerprint Authentication</li>
        <li>👉 Select Candidate</li>
        <li>👉 Vote Submitted</li>
    </ul>

    <div>
        <button class="start-btn" onclick="startVoting()">Start Voting</button>
        <button class="admin-btn" onclick="openAdmin()">Admin Dashboard</button>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <br>

    <!-- GitHub Project Link -->
    <a href="https://github.com/yourusername/online-voting-system" target="_blank" class="github-btn">
        View Project on GitHub
    </a>

<script>

function startVoting() {
    window.location.href = '/aadhaar';
}

function openAdmin() {
    window.location.href = '/admin';
}

function logout() {
    sessionStorage.clear();
    localStorage.clear();
    window.location.href = '/logout';
}

</script>

</body>
</html>
