<!DOCTYPE html>
<html>
<head>
    <title>Vote Submitted</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-image: url('https://i.pinimg.com/1200x/40/e9/1d/40e91d18406c23a5551a3c3d628ed39e.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: flex-end; /* align content towards right */
            align-items: center;       /* vertically center */
            padding-right: 200px;      /* slightly left from the edge */
            color: white;
        }

        .card {
            text-align: right;
            background: rgba(0,0,0,0.5);
            padding: 30px;
            border-radius: 10px;
        }

        .card h2 {
            font-size: 48px;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px white;
        }

        .card p {
            font-size: 28px;
            margin-bottom: 25px;
            text-shadow: 1px 1px 3px white;
        }

        .btn {
            display: inline-block;
            padding: 16px 35px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 5px;
            border: none;
            background-color: green;
            color: white;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: darkgreen;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            color: black;
            background: #ffffffcc; /* white with transparency */
        }

        th, td {
            padding: 12px;
            text-align: center;
            font-size: 18px;
        }

        th {
            background-color: #1e90ff;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #e0e0e0;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Vote Submitted 🎉</h2>
        <p>Thank you for voting</p>
        <a href="/" class="btn">Back to Dashboard</a>

        
</body>
</html>
